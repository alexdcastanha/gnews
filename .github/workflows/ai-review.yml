name: AI Code Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Gemini AI Code Reviewer
        uses: truongnh1992/gemini-ai-code-reviewer@main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.AI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-pro
          EXCLUDE: "*.md,*.txt,package-lock.json,*.yml,*.yaml"
          PROMPT: |
            Aja como um Engenheiro de Seguranca Senior (DevSecOps).
            Analise o DIFF deste Pull Request buscando:
            1. Vulnerabilidades OWASP Top 10 (especialmente SQL Injection e Insecure Deserialization).
            2. Code Smells e complexidade ciclomatica desnecessaria.
            3. Aderencia as melhores praticas de Java 25 e Spring Boot 3.4.
            4. Responda com comentarios tecnicos e construtivos diretamente nas linhas do codigo afetado.